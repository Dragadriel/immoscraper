version: "2"
services:
  immoscraper:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    environment:
      - TELEGRAM_TOKEN=${TELEGRAM_TOKEN}
      - CHAT_ID=${CHAT_ID}
      - SEARCH_URL=${SEARCH_URL}
    volumes:
      - immoscraper_data:/app/data

volumes:
  immoscraper_data:
    driver: local
